<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - SANQOO GLOBAL</title>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Exo', sans-serif; background: #09002a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: inline-block; }
p { color: #aaa6b9; line-height: 1.75; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
header { position: fixed; left: 0; right: 0; z-index: 99; padding: 12px 0; background: rgba(20,14,56,0.9); }
.header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; padding: 0 40px; }
.logo img { width: 90px; }
nav ul { display: flex; align-items: center; gap: 28px; }
nav ul li a { color: #e5e7eb; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; transition: color 0.3s; }
nav ul li a:hover { color: #b154f0; }
.mobile-toggle { display: none; font-size: 1.5rem; color: #fff; cursor: pointer; }
.page-banner { background: #140e38; padding: 120px 0 60px; text-align: center; }
.page-banner h1 { font-size: 2.5rem; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
.page-banner p { color: #aaa6b9; }
.section-padding { padding: 60px 0; flex: 1; }
.signup-form { max-width: 480px; margin: 0 auto; background: #140e38; padding: 40px; border-radius: 12px; border: 1px solid #281d59; }
.signup-form h2 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; color: #b154f0; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #e5e7eb; font-size: 0.9rem; }
.form-group input { width: 100%; padding: 14px 18px; background: #09002a; border: 1px solid #281d59; border-radius: 8px; color: #fff; font-family: 'Exo', sans-serif; font-size: 1rem; outline: none; transition: border 0.3s; }
.form-group input:focus { border-color: #b154f0; }
.btn-submit { width: 100%; background: #b154f0; color: #fff; border: none; padding: 16px; font-family: 'Exo', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; border-radius: 8px; cursor: pointer; transition: opacity 0.3s; margin-top: 10px; }
.btn-submit:hover { opacity: 0.85; }
.divider { text-align: center; margin: 20px 0; color: #6c757d; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #281d59; }
.divider::before { left: 0; }
.divider::after { right: 0; }
.social-login { display: flex; gap: 12px; justify-content: center; }
.social-login a { display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; background: #09002a; border: 1px solid #281d59; border-radius: 50%; transition: border-color 0.3s; }
.social-login a:hover { border-color: #b154f0; }
.social-login a img { width: 28px; height: 28px; object-fit: contain; }
.login-link { text-align: center; margin-top: 20px; color: #9ca3af; }
.login-link a { color: #b154f0; font-weight: 600; }
@media (max-width: 992px) { header nav { display: none; } .mobile-toggle { display: block; } .header-inner { padding: 0 20px; } }
@media (max-width: 600px) { .signup-form { padding: 25px; } }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><img src="images/logo.webp" alt="SANQOO GLOBAL"></a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="match.html">Match</a></li>
        <li><a href="index.html">Pages</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
    <div class="mobile-toggle" onclick="openMenu()">☰</div>
  </div>
</header>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMenu()"></div>
<div class="mobile-menu" id="mobileMenu">
  <div class="close-btn" onclick="closeMenu()">✕</div>
  <nav>
    <a href="index.html">Home</a><a href="match.html">Match</a><a href="about.html">About Us</a><a href="game.html">All Games</a><a href="player.html">Players</a><a href="blog.html">Blog</a><a href="FAQ.html">FAQ</a><a href="contact.html">Contact Us</a><a href="signup.html">Sign Up</a>
  </nav>
</div>

<section class="page-banner">
  <div class="container">
    <h1>Create Account</h1>
    <p>Join the SANQOO GLOBAL community</p>
  </div>
</section>

<section class="section-padding">
  <div class="container">
    <div class="signup-form">
      <h2>Sign Up</h2>
      <form onsubmit="alert('Account created successfully! Welcome to SANQOO GLOBAL.'); return false;">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>
      <div class="divider">or sign up with</div>
      <div class="social-login">
        <a href="#"><img src="images/picture/TIKTOKLOGO.webp" alt="TikTok"></a>
        <a href="#"><img src="images/picture/DiscordLOGO.webp" alt="Discord"></a>
        <a href="#"><img src="images/picture/XLOGO.webp" alt="X"></a>
      </div>
      <div class="login-link">
        Already have an account? <a href="#">Log In</a>
      </div>
    </div>
  </div>
</section>
<script>
function openMenu() { document.getElementById('mobileMenu').classList.add('open'); document.getElementById('mobileOverlay').classList.add('show'); }
function closeMenu() { document.getElementById('mobileMenu').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('show'); }
</script>
</body>
</html>
